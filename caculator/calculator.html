<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <div class="calculator">
        <div class="display">0</div>
        <div class="buttons">
          <button class="blue operator ac">AC</button>
          <button class="blue operator">%</button>
          <button class="blue operator">/</button>
          <button class="blue operator">
            <i class="fa-solid fa-delete-left del"></i>
          </button>
          <button class="numbers">7</button>
          <button class="numbers">8</button>
          <button class="numbers">9</button>
          <button class="blue operator">x</button>
          <button class="numbers">4</button>
          <button class="numbers">5</button>
          <button class="numbers">6</button>
          <button class="blue operator">+</button>
          <button class="numbers">1</button>
          <button class="numbers">2</button>
          <button class="numbers">3</button>
          <button class="blue operator">-</button>
          <button class="numbers">0</button>
          <button class="numbers">00</button>
          <button>.</button>
          <button class="enter">=</button>
        </div>
      </div>
    </div>
   <script src="script.js"></script>
  </body>
</html>
