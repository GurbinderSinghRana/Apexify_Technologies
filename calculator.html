<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <style>
        body{background: #c9bfbf;}
        .red{background:#305ef6;}
      .container {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;}
      .calculator {
        height: 440px;
        width: 300px;
        background: #111F35;
        border-radius: 20px;
        box-shadow: 2px 2px 15px black;}
      .display {
        height: 80px;
        width: 90%;
        margin: 14px;
        border-radius: 20px;
        box-shadow: 2px 2px 15px black;
        color: #cecece;
        text-align: right;
        font-size: 70px;}
      .buttons{
        display: grid;
        grid-template-columns: auto auto auto auto;
        gap: 10px;
        padding: 10px;
        margin-left: 10px;}
      button{
        height: 50px;
        width: 50px;
        font-size: 20px;
        color: #fff;
        border-style: none;
        border-radius: 30px;
        background:#111F35;
        box-shadow: 2px 2px 15px black;}
        .numbers:hover{background: #1c3a67;}
        .operator:hover{background:#1739aa;}
        .enter{background:#43be36;}.enter:hover{background:#2c7f23;}
    </style>
  </head>
  <body>
    <div class="container">
      <div class="calculator">
        <div class="display">1</div>
        <div class="buttons">
          <button class="red operator">AC</button>
          <button class="red operator">%</button>
          <button class="red operator">/</button>
          <button class="red operator"><i class="fa-solid fa-delete-left"></i></button>
          <button class="numbers">7</button>
          <button class="numbers">8</button>
          <button class="numbers">9</button>
          <button class="red operator">X</button>
          <button class="numbers">4</button>
          <button class="numbers">5</button>
          <button class="numbers">6</button>
          <button class="red operator">+</button>
          <button class="numbers">1</button>
          <button class="numbers">2</button>
          <button class="numbers">3</button>
          <button class="red operator">-</button>
          <button class="numbers">0</button>
          <button class="numbers">00</button>
          <button>.</button>
          <button class="enter">=</button>
        </div>
      </div>
    </div>
    <script>
        const display = document.querySelectorAll('display') 
        const number = document.querySelectorAll("numbers");\
        number.addEventListener('click',(e)=>{
        display.innerhtml = number;
        })
        
    </script>
  </body>
</html>
